<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TR // Neon AI Assistant</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #050510;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
      overflow: hidden;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      padding: 20px 20px 50px 20px;
    }

    /* Container for the neon eyes */
    .eyes-container {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 60px;
      width: 100%;
      margin-top: -30px;
    }

    /* Base Layer: Standard State (Blue) */
    .eye {
      width: 140px;
      height: 240px;
      border-radius: 70px;
      background-color: #1a66ff;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      box-shadow: 0 0 40px #4d00ff, 0 0 80px #4d00ff;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      transform-origin: center;
    }

    .eye-layer-2 {
      width: 105px;
      height: 205px;
      border-radius: 52px;
      background-color: #66ffff;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 0 20px #66ffff;
      transition: all 0.4s ease;
    }

    .eye-layer-3 {
      width: 75px;
      height: 175px;
      border-radius: 37px;
      background-color: #0044ff;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: all 0.4s ease;
    }

    .eye-center {
      width: 35px;
      height: 135px;
      border-radius: 17px;
      background-color: #08081a;
      box-shadow: inset 0 0 15px rgba(0, 0, 0, 0.9);
      transition: all 0.3s ease;
    }

    /* --- IDLE FLOAT STATE --- */
    .eye.floating {
      animation: idleFloat 4s ease-in-out infinite alternate;
    }

    /* --- DYNAMIC AI STATES --- */

    /* 1. Closed/Sleeping State */
    .eye.closed {
      transform: scaleY(0) !important;
      opacity: 0.1;
    }

    /* 2. Listening State (Cyan Pulse) */
    .eye.listening-state {
      background-color: #00f2ff;
      box-shadow: 0 0 40px #00f2ff, 0 0 80px #00f2ff;
    }
    .eye.listening-state .eye-layer-3 { background-color: #0088cc; }

    /* 3. Thinking State (Magenta Spin/Vibe) */
    .eye.thinking-state {
      background-color: #ff007f;
      box-shadow: 0 0 50px #ff007f, 0 0 90px #ff007f;
      animation: thinkingVibe 0.3s ease-in-out infinite alternate;
    }
    .eye.thinking-state .eye-layer-2 { background-color: #ff99dd; box-shadow: 0 0 20px #ff99dd; }
    .eye.thinking-state .eye-layer-3 { background-color: #99004c; }

    /* 4. Speaking State (Green Wave) */
    .eye.speaking-state {
      background-color: #39ff14;
      box-shadow: 0 0 50px #39ff14, 0 0 100px #39ff14;
      transform: scale(1.08);
    }
    .eye.speaking-state .eye-layer-2 { background-color: #bfff80; box-shadow: 0 0 25px #bfff80; }
    .eye.speaking-state .eye-layer-3 { background-color: #1b8000; }
    .eye.speaking-state .eye-center { transform: scaleY(1.2); }

    /* --- ANIMATIONS --- */
    @keyframes idleFloat {
      0% { transform: translateY(0px); }
      100% { transform: translateY(-12px); }
    }

    @keyframes thinkingVibe {
      0% { transform: scaleY(0.95) scaleX(1.02); }
      100% { transform: scaleY(1.05) scaleX(0.98); }
    }

    .eye.blink-animation {
      animation: blinkEffect 0.22s ease-in-out;
    }

    @keyframes blinkEffect {
      0%, 100% { transform: scaleY(1); opacity: 1; }
      50% { transform: scaleY(0); opacity: 0.1; }
    }

    /* Dashboard UI Layout */
    .dashboard {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
      width: 100%;
      max-width: 500px;
      z-index: 10;
      margin-bottom: 10px;
    }

    #voiceStatus {
      color: #00f2ff;
      font-size: 14px;
      text-shadow: 0 0 8px rgba(0, 242, 255, 0.4);
      min-height: 24px;
      text-align: center;
      font-weight: 500;
    }

    #aiResponseText {
      color: #fff;
      font-size: 15px;
      text-align: center;
      min-height: 40px;
      max-width: 90%;
      line-height: 1.4;
      opacity: 0.9;
    }

    .controls {
      display: flex;
      justify-content: center;
      align-items: center;
      width: auto;
      background: rgba(255, 255, 255, 0.03);
      padding: 12px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    button.voice-btn {
      background: transparent;
      color: #00f2ff;
      border: 2px solid #00f2ff;
      width: 60px;
      height: 60px;
      font-size: 22px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: all 0.2s ease;
      box-shadow: 0 0 12px rgba(0, 242, 255, 0.2);
    }

    button.voice-btn:hover {
      background: #00f2ff;
      color: #000;
      box-shadow: 0 0 25px #00f2ff;
    }
    
    button.listening {
      background: #00f2ff;
      color: #000;
      box-shadow: 0 0 30px #00f2ff;
    }
  </style>

  <script type="importmap">
    {
      "imports": {
        "@google/genai": "https://esm.run/@google/genai"
      }
    }
  </script>
</head>
<body>

  <div class="eyes-container">
    <div class="eye floating" id="leftEye">
      <div class="eye-layer-2">
        <div class="eye-layer-3">
          <div class="eye-center"></div>
        </div>
      </div>
    </div>
    
    <div class="eye floating" id="rightEye">
      <div class="eye-layer-2">
        <div class="eye-layer-3">
          <div class="eye-center"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="dashboard">
    <div id="voiceStatus">Tap the glowing mic to start talking to TR</div>
    <div id="aiResponseText"></div>
    <div class="controls">
      <button class="voice-btn" id="micBtn" onclick="toggleVoiceControl()" title="Talk to TR">🎙️</button>
    </div>
  </div>

  <script type="module">
    import { GoogleGenAI } from '@google/genai';

    // ⚠️ CRITICAL REMINDER: Swap out this old compromised key for your freshly generated one!
    const ai = new GoogleGenAI({ apiKey: "AQ.Ab8RN6IAJTNfntIJdEVghsqiDKq9nIHjncEBtkF4Pv_GevNgTg" });

    const leftEye = document.getElementById('leftEye');
    const rightEye = document.getElementById('rightEye');
    const micBtn = document.getElementById('micBtn');
    const voiceStatus = document.getElementById('voiceStatus');
    const aiResponseText = document.getElementById('aiResponseText');

    let isListeningModeExplicit = false; 
    let naturalBlinkTimer = null;

    // --- CRITICAL BROWSER FIX ---
    // Connects the hidden module code directly to the browser window so your HTML button clicks find it!
    window.toggleVoiceControl = toggleVoiceControl;

    // --- State Handlers ---
    function clearAllStates() {
      leftEye.classList.remove('listening-state', 'thinking-state', 'speaking-state');
      rightEye.classList.remove('listening-state', 'thinking-state', 'speaking-state');
    }

    function setAIState(state) {
      clearAllStates();
      if(state === 'listening') {
        leftEye.classList.add('listening-state');
        rightEye.classList.add('listening-state');
      } else if(state === 'thinking') {
        leftEye.classList.add('thinking-state');
        rightEye.classList.add('thinking-state');
      } else if(state === 'speaking') {
        leftEye.classList.add('speaking-state');
        rightEye.classList.add('speaking-state');
      }
    }

    function closeEyes() {
      stopVoiceSystem();
      leftEye.classList.add('closed');
      rightEye.classList.add('closed');
      clearInterval(naturalBlinkTimer);
    }

    function openEyes() {
      leftEye.classList.remove('closed');
      rightEye.classList.remove('closed');
      startNaturalBlinking();
    }

    function blinkBothEyes() {
      if (leftEye.classList.contains('closed')) return;
      [leftEye, rightEye].forEach(eye => {
        eye.classList.remove('blink-animation');
        void eye.offsetWidth; 
        eye.classList.add('blink-animation');
      });
    }

    // Passive Organic Behavior Loop
    function startNaturalBlinking() {
      clearInterval(naturalBlinkTimer);
      naturalBlinkTimer = setInterval(() => {
        if (!window.speechSynthesis.speaking && Math.random() > 0.3) {
          blinkBothEyes();
        }
      }, 4000);
    }
    startNaturalBlinking();

    // --- Speech Synthesis (The AI's Mouth) ---
    function aiSpeak(text) {
      setAIState('speaking');
      aiResponseText.textContent = text;

      const mouthSyncInterval = setInterval(() => {
        if(window.speechSynthesis.speaking) {
          if(Math.random() > 0.75) blinkBothEyes();
        } else {
          clearInterval(mouthSyncInterval);
        }
      }, 250);

      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = 'en-US';
      
      utterance.onend = () => {
        clearAllStates();
        if (isListeningModeExplicit && recognition) {
          try { recognition.start(); } catch(e){}
        } else if (!isListeningModeExplicit) {
          voiceStatus.textContent = "Voice OFF.";
        }
      };

      window.speechSynthesis.speak(utterance);
    }

    // --- New Cloud Brain Engine (Gemini 1.5 Flash Connected) ---
    async function fetchGeminiResponse(userInput) {
      setAIState('thinking');
      voiceStatus.textContent = "TR is consulting the cloud matrix...";

      // Quick offline keyword checks for hardware animations before passing to API
      const query = userInput.toLowerCase().trim();
      if (query.includes("close") && query.includes("eye")) {
        setTimeout(closeEyes, 800);
        aiSpeak("Understood. Shutting down system viewports and entering sleep mode.");
        return;
      }
      if (query.includes("open") && query.includes("eye")) {
        setTimeout(openEyes, 500);
        aiSpeak("System viewports online. TR core is visualizing your environment.");
        return;
      }
      if (query.includes("blink")) {
        setTimeout(blinkBothEyes, 400);
        aiSpeak("Affirmative, resetting optic grid alignment.");
        return;
      }

      // If it's a structural conversation query, fetch from Gemini Cloud
      try {
        const response = await ai.models.generateContent({
          model: 'gemini-1.5-flash',
          contents: userInput,
          config: {
            systemInstruction: "You are TR, a brilliant, friendly digital AI assistant operating behind a glowing neon optic grid. Keep your responses short, natural, and punchy (1-2 sentences maximum) so they sound great when read aloud.",
            temperature: 0.7,
          }
        });

        aiSpeak(response.text);

      } catch (error) {
        console.error("Gemini API Error:", error);
        aiSpeak("Connection to my cloud brain was disrupted. Please check my API key configuration.");
        clearAllStates();
      }
    }

    // --- Voice Recognition Engine ---
    let recognition;

    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      recognition = new SpeechRecognition();
      recognition.continuous = false; 
      recognition.lang = 'en-US';
      recognition.interimResults = false;

      recognition.onstart = () => {
        micBtn.classList.add('listening');
        voiceStatus.textContent = "Say Now.";
        setAIState('listening');
      };

      recognition.onend = () => {
        if (!isListeningModeExplicit) {
          micBtn.classList.remove('listening');
          voiceStatus.textContent = "Voice OFF.";
          clearAllStates();
        } else if (!window.speechSynthesis.speaking) {
          voiceStatus.textContent = "Thinking...";
          clearAllStates();
        }
      };

      recognition.onresult = (event) => {
        const textHeard = event.results[0][0].transcript;
        voiceStatus.textContent = `Heard: "${textHeard}"`;
        
        try { recognition.stop(); } catch(e){}
        
        // Pass audio straight to the async Gemini logic
        fetchGeminiResponse(textHeard); 
      };

      recognition.onerror = (event) => {
        if(event.error !== 'no-speech') {
          console.error(event.error);
          voiceStatus.textContent = `Sync Error: ${event.error}`;
        } else {
          if (isListeningModeExplicit && !window.speechSynthesis.speaking) {
            try { recognition.start(); } catch(e){}
          }
        }
      };

    } else {
      micBtn.style.display = 'none';
      voiceStatus.textContent = "Speech recognition engine un-supported in this local context.";
    }

    function stopVoiceSystem() {
      isListeningModeExplicit = false;
      micBtn.classList.remove('listening');
      window.speechSynthesis.cancel();
      if (recognition) { try { recognition.stop(); } catch(e){} }
      clearAllStates();
    }

    function toggleVoiceControl() {
      if (!recognition) return;
      if (isListeningModeExplicit) {
        stopVoiceSystem();
      } else {
        isListeningModeExplicit = true;
        openEyes();
        try { recognition.start(); } catch(e){}
      }
    }
  </script>
</body>
</html>
